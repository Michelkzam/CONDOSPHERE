<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Residências</title><link rel="stylesheet" href="/src/styles/condosphere.css"><style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style></head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Cadastro de Residências</div><div class="card-subtitle">Associe unidades habitacionais a perfis financeiros</div></div>
        <div style="display:flex; gap:8px"><button class="btn btn-primary" onclick="showToast('Abrir formulário de nova residência')">Incluir Novo</button><button class="btn btn-secondary">Modelo (.xlsx)</button><button class="btn btn-success">Importar (.xlsx)</button></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="form-label">Busca Rápida de Lotes</label><input type="text" class="form-control" placeholder="Pesquise por identificador, proprietário ou perfil..."></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Identificador</th><th>Proprietário</th><th>Endereço</th><th>Perfil Financeiro</th><th>Valor Base</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody id="res-tbody"><tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:15px">Nenhuma residência cadastrada.</td></tr></tbody>
    </table></div>
</div>
<script>function showToast(m,t){parent.postMessage({type:'toast',msg:m,toastType:t||'success'},'*');}</script>
</body></html>
