<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residências</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <script src="/js/app.js"></script>
    <style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Cadastro de Residências</div><div class="card-subtitle">Associe unidades habitacionais a perfis financeiros</div></div>
        <div style="display:flex; gap:8px"><button class="btn btn-primary" onclick="promptAddResidence()">Incluir Novo</button><button class="btn btn-secondary" onclick="showToast('Modelo .xlsx baixado!')">Modelo (.xlsx)</button><button class="btn btn-success" onclick="showToast('Importação via .xlsx em breve!')">Importar (.xlsx)</button><button class="btn btn-secondary" onclick="exportResidences()">Exportar (.xlsx)</button></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="form-label">Busca Rápida de Lotes</label><input type="text" class="form-control" placeholder="Pesquise por identificador, proprietário ou perfil..." oninput="universalSearch(this, residencesList, renderResidencesFromList, ['identifier','owner','address','profile_name'])"></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Identificador</th><th>Proprietário</th><th>Endereço</th><th>Perfil Financeiro</th><th>Valor Base</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody id="res-tbody"></tbody>
    </table></div>
</div>
<script>
function promptAddResidence() {
    var id = prompt('Identificador (ex: Quadra A - Lote 05):');
    if (!id) return;
    var owner = prompt('Proprietário Principal:');
    var addr = prompt('Endereço Completo:', '-');
    var val = parseFloat(prompt('Valor Base Mensal:', '300')) || 300;
    addResidence(id, owner, addr, 'Perfil Padrão', val, 'Ativo');
}
</script>
</body></html>
