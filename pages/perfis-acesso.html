<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfis de Acesso - CondoSphere</title>
    <link rel="stylesheet" href="/src/styles/global.css">
    <style>
        .profile-card { background: var(--bg-darkCard); border: 1px solid var(--color-border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
        .module-card { background: var(--bg-darkBg); border: 1px solid var(--color-border); border-radius: 8px; padding: 12px; }
        .module-name { font-size: 12px; font-weight: 700; color: white; margin-bottom: 8px; }
        .perm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .perm-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--color-text-muted); }
        .perm-item input { accent-color: var(--color-primary); }
        .perm-item.granted { color: var(--color-success); }
    </style>
</head>
<body style="overflow:auto; padding:24px; background:var(--bg-darkBg)">
    <div style="max-width:1000px; margin:0 auto">
        <div style="background:var(--bg-darkCard); border:1px solid var(--color-border); border-radius:12px; padding:20px; margin-bottom:24px">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div>
                    <h1 style="font-size:24px; font-weight:800; color:white; margin:0">🔑 Perfis de Acesso (RBAC)</h1>
                    <p style="font-size:12px; color:var(--color-text-muted); margin:4px 0 0">Configure o que cada perfil pode acessar no sistema</p>
                </div>
                <button class="btn btn-primary" onclick="openProfileModal()">+ Novo Perfil</button>
            </div>
        </div>

        <div id="profiles-container">
            <p style="text-align:center; color:var(--color-text-muted); padding:40px">Carregando perfis...</p>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="edit-overlay" style="display:none">
        <div class="edit-modal" style="max-width:600px">
            <h3 id="profile-modal-title">Novo Perfil</h3>
            <form id="profile-form">
                <input type="hidden" id="profile-id">
                <div class="form-group">
                    <label class="form-label">Nome do Perfil</label>
                    <input type="text" id="profile-name" class="form-control" required>
                </div>
                <div style="display:flex; gap:8px; margin-top:16px">
                    <button type="button" class="btn btn-secondary" onclick="closeProfileModal()" style="flex:1">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex:1">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://psbvjscrqhwhttvbstty.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzYnZqc2NycWh3aHR0dmJzdHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTA4MzAsImV4cCI6MjA5Njg2NjgzMH0.AFnX7TYKrpTSQMBEU9Rwj0g8nvgpSEDKSjGNb-FM2Gw';

        const MODULES = [
            { name: 'Dashboard', key: 'dashboard', perms: ['visualizar'] },
            { name: 'Portaria & Acesso', key: 'portaria', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Contas a Receber', key: 'recebiveis', perms: ['visualizar', 'cadastrar', 'editar', 'excluir', 'exportar'] },
            { name: 'Contas a Pagar', key: 'pagar', perms: ['visualizar', 'cadastrar', 'editar', 'excluir', 'exportar'] },
            { name: 'Conciliação Bancária', key: 'conciliacao', perms: ['visualizar', 'importar', 'exportar'] },
            { name: 'Relatórios & Gestão', key: 'relatorios', perms: ['visualizar', 'exportar'] },
            { name: 'Residências', key: 'residencias', perms: ['visualizar', 'cadastrar', 'editar', 'excluir', 'importar', 'exportar'] },
            { name: 'Moradores', key: 'moradores', perms: ['visualizar', 'cadastrar', 'editar', 'excluir', 'importar', 'exportar'] },
            { name: 'Veículos', key: 'veiculos', perms: ['visualizar', 'cadastrar', 'editar', 'excluir', 'importar', 'exportar'] },
            { name: 'Áreas Comuns', key: 'areas', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Reservas', key: 'reservas', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Assembleias', key: 'assembleias', perms: ['visualizar', 'cadastrar', 'editar', 'excluir', 'votar'] },
            { name: 'Documentos', key: 'documentos', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Funcionários', key: 'funcionarios', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Folha de Pagamento', key: 'folha', perms: ['visualizar', 'cadastrar', 'editar', 'exportar'] },
            { name: 'Controle de Ponto', key: 'ponto', perms: ['visualizar', 'cadastrar'] },
            { name: 'Portal do Colaborador', key: 'portal', perms: ['visualizar'] },
            { name: 'Prestadores', key: 'prestadores', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Dados da Empresa', key: 'empresa', perms: ['visualizar', 'editar'] },
            { name: 'Usuários do Sistema', key: 'usuarios', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Perfis de Acesso', key: 'perfis', perms: ['visualizar', 'cadastrar', 'editar', 'excluir'] },
            { name: 'Configurações', key: 'config', perms: ['visualizar', 'editar'] }
        ];

        let profiles = [];

        async function supabaseQuery(table, select = '*', filters = {}) {
            let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select}`;
            for (const [key, value] of Object.entries(filters)) {
                url += `&${key}=eq.${encodeURIComponent(value)}`;
            }
            const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
            return await res.json();
        }

        async function loadProfiles() {
            profiles = await supabaseQuery('profiles', '*');
            // Also load module_permissions
            const perms = await supabaseQuery('module_permissions', '*');
            // Attach permissions to profiles
            profiles.forEach(p => {
                p.module_permissions = perms.filter(m => m.profile_id === p.id);
            });
            renderProfiles();
        }

        function renderProfiles() {
            const container = document.getElementById('profiles-container');
            if (profiles.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--color-text-muted); padding:40px">Nenhum perfil encontrado</p>';
                return;
            }

            container.innerHTML = profiles.map(p => `
                <div class="profile-card">
                    <div class="profile-header">
                        <div>
                            <h2 style="font-size:18px; font-weight:700; color:white; margin:0">${p.name}</h2>
                            <p style="font-size:11px; color:var(--color-text-muted); margin:4px 0 0">${p.module_permissions?.length || 0} módulos configurados</p>
                        </div>
                        <div style="display:flex; gap:8px">
                            <button class="btn btn-secondary btn-sm" onclick="editProfile('${p.id}')">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteProfile('${p.id}')">Excluir</button>
                        </div>
                    </div>
                    <div class="module-grid">
                        ${MODULES.map(m => {
                            const perm = p.module_permissions?.find(mp => mp.module_name === m.key);
                            const hasView = perm?.can_view || p.name === 'Administrador';
                            return `
                                <div class="module-card">
                                    <div class="module-name">${m.name}</div>
                                    <div class="perm-grid">
                                        <label class="perm-item ${perm?.can_view ? 'granted' : ''}">
                                            <input type="checkbox" ${perm?.can_view ? 'checked' : ''} onchange="togglePerm('${p.id}','${m.key}','can_view',this.checked)"> Ver
                                        </label>
                                        <label class="perm-item ${perm?.can_create ? 'granted' : ''}">
                                            <input type="checkbox" ${perm?.can_create ? 'checked' : ''} onchange="togglePerm('${p.id}','${m.key}','can_create',this.checked)"> Criar
                                        </label>
                                        <label class="perm-item ${perm?.can_edit ? 'granted' : ''}">
                                            <input type="checkbox" ${perm?.can_edit ? 'checked' : ''} onchange="togglePerm('${p.id}','${m.key}','can_edit',this.checked)"> Editar
                                        </label>
                                        <label class="perm-item ${perm?.can_delete ? 'granted' : ''}">
                                            <input type="checkbox" ${perm?.can_delete ? 'checked' : ''} onchange="togglePerm('${p.id}','${m.key}','can_delete',this.checked)"> Excluir
                                        </label>
                                        <label class="perm-item ${perm?.can_export ? 'granted' : ''}">
                                            <input type="checkbox" ${perm?.can_export ? 'checked' : ''} onchange="togglePerm('${p.id}','${m.key}','can_export',this.checked)"> Exportar
                                        </label>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function togglePerm(profileId, moduleName, permField, value) {
            const existing = profiles.find(p => p.id === profileId)?.module_permissions?.find(mp => mp.module_name === moduleName);
            
            if (existing) {
                await fetch(`${SUPABASE_URL}/rest/v1/module_permissions?id=eq.${existing.id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [permField]: value })
                });
            } else {
                await fetch(`${SUPABASE_URL}/rest/v1/module_permissions`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ profile_id: profileId, module_name: moduleName, [permField]: value })
                });
            }
            await loadProfiles();
        }

        function openProfileModal(id) {
            document.getElementById('profile-modal-title').innerText = id ? 'Editar Perfil' : 'Novo Perfil';
            document.getElementById('profile-id').value = id || '';
            document.getElementById('profile-name').value = id ? (profiles.find(p => p.id === id)?.name || '') : '';
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }

        function editProfile(id) { openProfileModal(id); }

        async function deleteProfile(id) {
            if (!confirm('Excluir este perfil?')) return;
            await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            await loadProfiles();
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('profile-id').value;
            const data = { name: document.getElementById('profile-name').value };
            
            if (id) {
                await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } else {
                await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            }
            closeProfileModal();
            await loadProfiles();
        });

        loadProfiles();
    </script>
</body>
</html>
