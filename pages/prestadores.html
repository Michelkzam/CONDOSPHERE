<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestadores de Serviço</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <script src="/js/app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="/js/pdf-reports.js"></script>
    <style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Prestadores de Serviço</div><div class="card-subtitle">Gerencie contratos de empresas terceirizadas</div></div>
        <div style="display:flex; gap:8px">
            <button class="btn btn-primary" onclick="promptAddPrestador()">+ Novo Prestador</button>
            <button class="btn btn-danger" onclick="generatePrestadoresPDF()">📄 Relatório (.pdf)</button>
        </div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="form-label">Busca Rápida</label><input type="text" class="form-control" placeholder="Pesquise por empresa, CNPJ ou serviço..."></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Empresa</th><th>CNPJ</th><th>Serviço</th><th>Valor Contrato</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody id="prov-tbody"></tbody>
    </table></div>
</div>
<script>
function promptAddPrestador() {
    var company = prompt('Nome da Empresa:');
    if (!company) return;
    var cnpj = prompt('CNPJ:');
    var service = prompt('Tipo de Serviço:');
    var value = parseFloat(prompt('Valor do Contrato:', '0')) || 0;
    addPrestador(company, cnpj, service, value);
}
</script>
</body></html>
