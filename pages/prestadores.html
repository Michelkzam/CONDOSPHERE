<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Prestadores de Serviço</title><link rel="stylesheet" href="/src/styles/condosphere.css"><style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style></head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Prestadores de Serviço</div><div class="card-subtitle">Gerencie contratos de empresas terceirizadas (limpeza, segurança, manutenção)</div></div>
        <button class="btn btn-primary">+ Novo Prestador</button>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="form-label">Busca Rápida</label><input type="text" class="form-control" placeholder="Pesquise por empresa, CNPJ ou serviço..."></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Empresa</th><th>CNPJ</th><th>Serviço</th><th>Valor Contrato</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody id="prov-tbody"><tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding:15px">Nenhum prestador cadastrado.</td></tr></tbody>
    </table></div>
</div>
</body></html>
