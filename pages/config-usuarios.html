<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários do Sistema</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <script src="/js/app.js"></script>
    <style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Usuários e Permissões Administrativas</div><div class="card-subtitle">Controle de logins e visualização de funcionários</div></div>
        <button class="btn btn-primary" onclick="promptAddUser()">Cadastrar Usuário</button>
    </div>
    <div class="table-wrap"><table>
        <thead><tr><th>Nome Completo</th><th>Username</th><th>CPF (Senha)</th><th>Perfil de Acesso</th><th>Tipo de Vínculo</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody id="usr-tbody"></tbody>
    </table></div>
</div>
<script>
function promptAddUser() {
    var name = prompt('Nome completo:');
    if (!name) return;
    var username = prompt('Username (nome.sobrenome):');
    var cpf = prompt('CPF (será usado como senha):');
    var profile = prompt('Perfil (Administrador/Colaborador/Morador/Portaria):', 'Morador');
    addUser(name, username, cpf, profile);
}
</script>
</body></html>
