<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Usuários do Sistema</title><link rel="stylesheet" href="/src/styles/condosphere.css"><style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style></head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Usuários e Permissões Administrativas</div><div class="card-subtitle">Controle de logins e visualização de funcionários</div></div>
        <button class="btn btn-primary" onclick="showToast('Abrir formulário de usuário')">Cadastrar Usuário</button>
    </div>
    <div class="table-wrap"><table>
        <thead><tr><th>Nome Completo</th><th>Username</th><th>CPF (Senha)</th><th>Perfil de Acesso</th><th>Tipo de Vínculo</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody><tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:15px">Nenhum usuário cadastrado.</td></tr></tbody>
    </table></div>
</div>
</body></html>
