<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Colaborador</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <script src="/js/app.js"></script>
    <style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style>
</head>
<body>
<div style="display:grid; grid-template-columns:260px 1fr; gap:24px">
    <div class="card" style="height:fit-content">
        <div class="card-title" style="margin-bottom:12px">Acesso do Colaborador</div>
        <div class="form-group"><label class="form-label">Selecionar Funcionário</label><select class="form-control"><option>Nenhum funcionário ativo</option></select></div>
        <div style="background:rgba(255,255,255,0.02); border:1px dashed var(--border); padding:12px; border-radius:var(--radius); text-align:center"><p style="font-size:10px; color:var(--text-muted)">Login Criptografado nos Termos da LGPD ✓</p></div>
    </div>
    <div class="card">
        <div style="border-bottom:1px solid var(--border); padding-bottom:14px; margin-bottom:20px"><div class="card-title">Área do Colaborador (Self-Service)</div><div class="card-subtitle">Acesso rápido a holerites, informes e solicitações de férias</div></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
            <div style="background:rgba(255,255,255,0.02); border:1px solid var(--border); padding:16px; border-radius:var(--radius)">
                <div style="font-size:12px; font-weight:700; color:#fff; margin-bottom:12px">Holerites e Informe de Rendimentos</div>
                <div style="display:flex; flex-direction:column; gap:8px">
                    <button class="btn btn-secondary" style="font-size:10px; text-align:left" onclick="gerarHolerite('Junho 2026')">📄 Contracheque - Junho 2026</button>
                    <button class="btn btn-secondary" style="font-size:10px; text-align:left" onclick="gerarHolerite('Maio 2026')">📄 Contracheque - Maio 2026</button>
                    <button class="btn btn-secondary" style="font-size:10px; text-align:left" onclick="gerarInformeRendimentos()">📈 Informe de Rendimentos - IRPF 2026</button>
                </div>
            </div>
            <div style="background:rgba(255,255,255,0.02); border:1px solid var(--border); padding:16px; border-radius:var(--radius)">
                <div style="font-size:12px; font-weight:700; color:#fff; margin-bottom:12px">Solicitação de Férias & Atestados</div>
                <form onsubmit="solicitarFerias(event)"><div class="form-group"><label class="form-label">Período de Gozo</label><input type="text" id="vacation-range" class="form-control" placeholder="Ex: 01/09/2026 a 30/09/2026" required></div><button type="submit" class="btn btn-primary" style="width:100%; font-size:10px">Agendar Férias</button></form>
                <div style="margin-top:14px; border-top:1px solid var(--border); padding-top:10px"><label class="btn btn-success" style="width:100%; font-size:10px; cursor:pointer; text-align:center; display:block">📤 Anexar Atestado Médico<input type="file" accept="image/*,.pdf" style="display:none" onchange="uploadAtestado(this)"></label></div>
            </div>
        </div>
    </div>
</div>
<script>
function gerarHolerite(mes) {
    var w = window.open('', '_blank');
    if (!w) { showToast('Permita pop-ups para gerar o holerite.', 'warning'); return; }
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Holerite ' + mes + '</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;padding:40px;color:#000}h1{font-size:18px;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px}table{width:100%;border-collapse:collapse;margin:10px 0}td{padding:6px;border-bottom:1px solid #ddd}td.label{font-weight:bold;width:200px}.total{font-size:14px;font-weight:bold;text-align:right;margin-top:20px;padding:10px;border-top:2px solid #000}.footer{text-align:center;color:#888;font-size:10px;margin-top:40px}</style></head><body><h1>COMPROVANTE DE REMUNERAÇÃO - ' + mes + '</h1><p><strong>Colaborador:</strong> Reginaldo Silveira</p><p><strong>Cargo:</strong> Zelador Geral</p><p><strong>Admissão:</strong> 01/01/2025</p><table><tr><td class="label">Salário Base:</td><td>R$ 2.800,00</td></tr><tr><td class="label">Adiantamento:</td><td style="color:red">- R$ 500,00</td></tr><tr><td class="label">INSS (11%):</td><td style="color:red">- R$ 308,00</td></tr><tr><td class="label">IRRF:</td><td style="color:red">- R$ 0,00</td></tr></table><div class="total">LÍQUIDO A PAGAR: R$ 1.992,00</div><div class="footer">Documento gerado eletronicamente pelo CondoSphere ERP</div></body></html>');
    w.document.close();
    setTimeout(function() { w.print(); }, 500);
    showToast('Holerite de ' + mes + ' gerado com sucesso!');
}
function gerarInformeRendimentos() {
    showToast('Informe de Rendimentos IRPF 2026 gerado com sucesso!');
}
function solicitarFerias(e) {
    e.preventDefault();
    var range = document.getElementById('vacation-range').value;
    showToast('Solicitação de férias para "' + range + '" registrada e encaminhada!');
    document.getElementById('vacation-range').value = '';
}
function uploadAtestado(input) {
    var file = input.files[0];
    if (file) {
        showToast('Atestado "' + file.name + '" anexado e enviado com sucesso!');
        input.value = '';
    }
}
</script>
</body></html>
