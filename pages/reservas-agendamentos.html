<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas & Agendamentos - CondoSphere</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-header { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 8px 0; text-transform: uppercase; }
        .calendar-day { padding: 8px; min-height: 80px; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s; }
        .calendar-day:hover { border-color: var(--primary); background: rgba(59,130,246,0.05); }
        .calendar-day.today { border-color: var(--primary); }
        .calendar-day.has-reservation { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
        .calendar-day .day-num { font-weight: 700; color: white; font-size: 12px; }
        .calendar-day .day-event { font-size: 9px; color: var(--success); font-weight: 600; margin-top: 4px; }
        .reservation-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
        .reservation-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
        .reservation-status.pending { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .reservation-status.confirmed { background: rgba(16,185,129,0.1); color: #10b981; }
        .reservation-status.cancelled { background: rgba(239,68,68,0.1); color: #ef4444; }
    </style>
</head>
<body style="overflow:auto; padding:24px; background:var(--bg-body)">
    <div style="max-width:1200px; margin:0 auto">
        <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:24px">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div>
                    <h1 style="font-size:24px; font-weight:800; color:white; margin:0">📅 Reservas & Agendamentos</h1>
                    <p style="font-size:12px; color:var(--text-muted); margin:4px 0 0">Gerencie as reservas de espaços comuns</p>
                </div>
                <button class="btn btn-primary" onclick="openReservationModal()">+ Nova Reserva</button>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:24px">
            <!-- Calendário -->
            <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
                    <button class="btn btn-ghost" onclick="changeMonth(-1)">← Anterior</button>
                    <h2 id="calendar-month" style="font-size:16px; font-weight:700; color:white; margin:0"></h2>
                    <button class="btn btn-ghost" onclick="changeMonth(1)">Próximo →</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>

            <!-- Lista de Reservas -->
            <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; max-height:600px; overflow-y:auto">
                <h2 style="font-size:14px; font-weight:700; color:white; margin-bottom:12px">Reservas</h2>
                <div id="reservations-list">
                    <p style="text-align:center; color:var(--text-muted); padding:20px">Carregando...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Reservation Modal -->
    <div id="reservation-modal" class="edit-overlay" style="display:none">
        <div class="edit-modal" style="max-width:500px">
            <h3>Nova Reserva</h3>
            <form id="reservation-form">
                <div class="form-group">
                    <label class="form-label">Área Comum</label>
                    <select id="res-space" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Data</label>
                    <input type="date" id="res-date" class="form-control" required>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <div class="form-group">
                        <label class="form-label">Horário Início</label>
                        <input type="time" id="res-start" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Horário Fim</label>
                        <input type="time" id="res-end" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Finalidade</label>
                    <input type="text" id="res-purpose" class="form-control" placeholder="Ex: Churrasco em família">
                </div>
                <div class="form-group">
                    <label class="form-label">Número de Convidados</label>
                    <input type="number" id="res-guests" class="form-control" value="1" min="1">
                </div>
                <div style="display:flex; gap:8px; margin-top:16px">
                    <button type="button" class="btn btn-secondary" onclick="closeReservationModal()" style="flex:1">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex:1">Reservar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://psbvjscrqhwhttvbstty.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzYnZqc2NycWh3aHR0dmJzdHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTA4MzAsImV4cCI6MjA5Njg2NjgzMH0.AFnX7TYKrpTSQMBEU9Rwj0g8nvgpSEDKSjGNb-FM2Gw';

        let reservations = [];
        let spaces = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        async function supabaseQuery(table, select = '*', filters = {}) {
            let url = `${SUPABASE_URL}/rest/v1/${table}?select=${select}`;
            for (const [key, value] of Object.entries(filters)) {
                url += `&${key}=eq.${encodeURIComponent(value)}`;
            }
            const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
            return await res.json();
        }

        async function loadData() {
            spaces = await supabaseQuery('common_areas', '*');
            reservations = await supabaseQuery('space_reservations', '*');
            renderCalendar();
            renderReservationsList();
            populateSpacesDropdown();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            document.getElementById('calendar-month').textContent = `${monthNames[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();

            let html = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d => `<div class="calendar-header">${d}</div>`).join('');

            for (let i = 0; i < firstDay; i++) html += '<div></div>';

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayReservations = reservations.filter(r => r.reservation_date === dateStr && r.status !== 'cancelled');
                const isToday = today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${dayReservations.length > 0 ? 'has-reservation' : ''}" onclick="showDayReservations('${dateStr}')">
                        <div class="day-num">${day}</div>
                        ${dayReservations.length > 0 ? `<div class="day-event">${dayReservations.length} reserva(s)</div>` : ''}
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function renderReservationsList() {
            const container = document.getElementById('reservations-list');
            if (reservations.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:20px">Nenhuma reserva</p>';
                return;
            }
            container.innerHTML = reservations.map(r => `
                <div class="reservation-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px">
                        <strong style="font-size:12px; color:white">${r.space_name}</strong>
                        <span class="reservation-status ${r.status}">${r.status === 'confirmed' ? 'Confirmado' : r.status === 'pending' ? 'Pendente' : 'Cancelado'}</span>
                    </div>
                    <div style="font-size:11px; color:var(--text-muted)">
                        <div>👤 ${r.resident_name}</div>
                        <div>📅 ${new Date(r.reservation_date).toLocaleDateString('pt-BR')} ${r.start_time ? '⏰ ' + r.start_time + ' - ' + r.end_time : ''}</div>
                        <div>🎯 ${r.purpose || 'Sem finalidade'}</div>
                    </div>
                </div>
            `).join('');
        }

        function populateSpacesDropdown() {
            const select = document.getElementById('res-space');
            select.innerHTML = spaces.map(s => `<option value="${s.id}">${s.name} (Cap: ${s.capacity})</option>`).join('');
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function showDayReservations(dateStr) {
            const dayRes = reservations.filter(r => r.reservation_date === dateStr);
            if (dayRes.length > 0) {
                alert(`Reservas em ${new Date(dateStr).toLocaleDateString('pt-BR')}:\n\n${dayRes.map(r => `• ${r.space_name} - ${r.resident_name} (${r.start_time || 'Dia todo'})`).join('\n')}`);
            } else {
                if (confirm(`Deseja criar uma reserva para ${new Date(dateStr).toLocaleDateString('pt-BR')}?`)) {
                    document.getElementById('res-date').value = dateStr;
                    openReservationModal();
                }
            }
        }

        function openReservationModal() { document.getElementById('reservation-modal').style.display = 'flex'; }
        function closeReservationModal() { document.getElementById('reservation-modal').style.display = 'none'; }

        document.getElementById('reservation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cached = localStorage.getItem('currentUser');
            const user = cached ? JSON.parse(cached) : null;
            const spaceId = document.getElementById('res-space').value;
            const space = spaces.find(s => s.id === spaceId);

            await fetch(`${SUPABASE_URL}/rest/v1/space_reservations`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    space_id: spaceId,
                    space_name: space?.name || '',
                    resident_name: user?.name || 'Anônimo',
                    reservation_date: document.getElementById('res-date').value,
                    start_time: document.getElementById('res-start').value || null,
                    end_time: document.getElementById('res-end').value || null,
                    purpose: document.getElementById('res-purpose').value,
                    guests_count: parseInt(document.getElementById('res-guests').value),
                    cleaning_fee: space?.cleaning_fee || 0,
                    status: 'confirmed'
                })
            });
            closeReservationModal();
            await loadData();
            alert('Reserva criada com sucesso!');
        });

        loadData();
    </script>
</body>
</html>
