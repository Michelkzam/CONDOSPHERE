<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas & Agendamentos</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <style>
        body{overflow:auto; padding:24px; background:var(--bg-body)}
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 12px; }
        .calendar-header { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 8px 0; text-transform: uppercase; }
        .calendar-day { padding: 8px; min-height: 70px; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s; }
        .calendar-day:hover { border-color: var(--primary); background: rgba(59,130,246,0.05); }
        .calendar-day.today { border-color: var(--primary); border-width: 2px; }
        .calendar-day.booked { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
        .calendar-day .day-num { font-weight: 700; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card" style="margin-bottom:24px">
        <div class="card-header">
            <div>
                <div class="card-title">📅 Agenda de Reservas</div>
                <div class="card-subtitle">Calendário do mês corrente com reservas</div>
            </div>
            <button class="btn btn-primary" onclick="openReservationModal()">+ Nova Reserva</button>
        </div>
        <div id="reservations-calendar-grid" class="calendar-grid"></div>
    </div>

    <div class="card">
        <div class="card-header">
            <div><div class="card-title">Lista Geral de Reservas</div><div class="card-subtitle">Administração de eventos agendados</div></div>
            <button class="btn btn-danger" onclick="showToast('Relatório PDF em breve!')">📄 Relatório (.pdf)</button>
        </div>
        <div class="table-wrap"><table>
            <thead><tr><th>ID</th><th>Área</th><th>Morador</th><th>Data</th><th>Horário</th><th>Taxa</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
            <tbody><tr><td colspan="8" style="text-align:center; color:var(--text-muted); padding:15px">Nenhuma reserva agendada.</td></tr></tbody>
        </table></div>
    </div>
</body>
</html>
