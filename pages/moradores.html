<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moradores</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <script src="/js/app.js"></script>
    <style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Fichas Cadastrais de Moradores</div><div class="card-subtitle">Organize os associados e controle categorias</div></div>
        <div style="display:flex; gap:8px"><button class="btn btn-primary" onclick="promptAddResident()">Incluir Novo</button><button class="btn btn-secondary">Modelo (.xlsx)</button><button class="btn btn-success">Importar (.xlsx)</button></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="form-label">Busca Rápida de Moradores</label><input type="text" class="form-control" placeholder="Pesquise por nome, CPF ou função..." oninput="universalSearch(this, residentsList, renderResidentsFiltered, ['name','cpf','contact','role'])"></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Nome</th><th>CPF</th><th>Contato</th><th>Função</th><th>Residência</th><th>Associado</th><th>Morador</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody id="mor-tbody"><tr><td colspan="9" style="text-align:center; color:var(--text-muted); padding:15px">Nenhum morador cadastrado.</td></tr></tbody>
    </table></div>
</div>
<script>
function renderResidentsFiltered(list) {
    var tbody = document.querySelector('#mor-tbody');
    if (!tbody) return;
    if (list.length === 0) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color:var(--text-muted); padding:15px">Nenhum resultado.</td></tr>'; return; }
    tbody.innerHTML = '';
    list.forEach(function(r) {
        var row = document.createElement('tr');
        row.innerHTML = '<td><strong>' + r.name + '</strong></td><td style="font-family:monospace">' + (r.cpf||'-') + '</td><td>' + (r.contact||'-') + '</td><td>' + (r.role||'Morador') + '</td><td>' + (r.residence_name||'-') + '</td><td>' + (r.is_associated?'✓':'✕') + '</td><td>' + (r.is_resident?'✓':'✕') + '</td><td><span class="badge badge-success">Ativo</span></td><td style="text-align:center"><div class="actions-cell"><button class="action-btn edit">✎</button><button class="action-btn delete">✕</button></div></td>';
        tbody.appendChild(row);
    });
}
function promptAddResident() {
    var name = prompt('Nome completo do morador:');
    if (!name) return;
    var cpf = prompt('CPF (somente números):');
    var contact = prompt('Contato/Telefone:');
    residentsList.push({ name:name, cpf:cpf, contact:contact, role:'Morador', residence_name:'-', is_associated:false, is_resident:true, status:'Ativo' });
    SafeStorage.setItem('condosphere_residents', JSON.stringify(residentsList));
    renderResidents();
    showToast('Morador "' + name + '" cadastrado!');
}
renderResidents();
</script>
</body></html>
