<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Moradores</title><link rel="stylesheet" href="/src/styles/condosphere.css"><style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style></head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Fichas Cadastrais de Moradores</div><div class="card-subtitle">Organize os associados e controle categorias</div></div>
        <div style="display:flex; gap:8px"><button class="btn btn-primary" onclick="showToast('Abrir formulário')">Incluir Novo</button><button class="btn btn-secondary">Modelo (.xlsx)</button><button class="btn btn-success">Importar (.xlsx)</button></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="form-label">Busca Rápida de Moradores</label><input type="text" class="form-control" placeholder="Pesquise por nome, CPF ou função..."></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Nome</th><th>CPF</th><th>Contato</th><th>Função</th><th>Residência</th><th>Associado</th><th>Morador</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody><tr><td colspan="9" style="text-align:center; color:var(--text-muted); padding:15px">Nenhum morador cadastrado.</td></tr></tbody>
    </table></div>
</div>
</body></html>
