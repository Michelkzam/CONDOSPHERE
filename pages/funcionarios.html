<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funcionários</title>
    <link rel="stylesheet" href="/src/styles/condosphere.css">
    <script src="/js/app.js"></script>
    <style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div><div class="card-title">Cadastro de Funcionários & Escalas (RH)</div><div class="card-subtitle">Gerencie colaboradores CLT, salários, adiantamentos</div></div>
        <div style="display:flex; gap:8px"><button class="btn btn-success" onclick="promptAddEmployee()">Incluir Funcionário</button><button class="btn btn-secondary" onclick="exportEmployees()">Exportar (.xlsx)</button></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label class="form-label">Busca Rápida de Funcionários</label><input type="text" class="form-control" placeholder="Pesquise por nome, CPF ou cargo..."></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Funcionário</th><th>CPF</th><th>Cargo</th><th>Salário Base</th><th>Adiantamento</th><th>Contato</th><th>Admissão</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
        <tbody id="emp-tbody"></tbody>
    </table></div>
</div>
<script>
function promptAddEmployee() {
    var name = prompt('Nome completo:');
    if (!name) return;
    var cpf = prompt('CPF:');
    var role = prompt('Cargo/Função:');
    var salary = parseFloat(prompt('Salário Base:', '2500')) || 2500;
    var contact = prompt('Contato:');
    addEmployee(name, cpf, role, salary, contact);
}
</script>
</body></html>
