<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RH & Escalas</title><link rel="stylesheet" href="/src/styles/condosphere.css"><style>body{overflow:auto;padding:24px;background:var(--bg-body)}</style></head>
<body>
<div class="card">
    <div class="card-title" style="margin-bottom:16px">RH e Escalas de Trabalho</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
        <div style="background:var(--bg-input); padding:16px; border:1px solid var(--border); border-radius:var(--radius)">
            <div style="font-weight:700; font-size:11px; color:var(--primary); margin-bottom:10px; text-transform:uppercase">Turnos Registrados</div>
            <ul style="font-size:11px; color:var(--text-muted); display:flex; flex-direction:column; gap:6px; list-style:none; padding:0">
                <li>• Portaria Diurna: 07:00 - 19:00 (12x36)</li>
                <li>• Portaria Noturna: 19:00 - 07:00 (12x36)</li>
                <li>• Zeladoria: 08:00 - 17:00 (Seg-Sex)</li>
            </ul>
        </div>
        <div style="background:var(--bg-input); padding:16px; border:1px solid var(--border); border-radius:var(--radius)">
            <div style="font-weight:700; font-size:11px; color:var(--primary); margin-bottom:10px; text-transform:uppercase">Departamentos</div>
            <ul style="font-size:11px; color:var(--text-muted); display:flex; flex-direction:column; gap:6px; list-style:none; padding:0">
                <li>• Operacional / Segurança</li>
                <li>• Administrativo</li>
                <li>• Financeiro / Governança</li>
            </ul>
        </div>
    </div>
</div>
</body></html>
